version: "3.7"

services:

  core:
    build:
      context: ./
      dockerfile: Dockerfile
    image: core:latest
    ports:
      - "8011:8011"
    volumes:
      - "./:/app"
    environment:
      - HOST=0.0.0.0
      - PORT=8011
      - _PATH=logs\  
      - DATABASE_URL=postgresql://postgres:2025@host.docker.internal:5432/Core_Demo
    restart: always
